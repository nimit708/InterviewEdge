version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd frontend
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: frontend/build
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
    appRoot: frontend
  - backend:
      phases:
        build:
          commands:
            - echo "Backend deployment is handled via CloudFormation and AWS CLI"
            - echo "Run backend/deploy-complete.ps1 locally to deploy backend"
            - echo "API URL will be available in backend/api-url.txt after deployment"
      artifacts:
        baseDirectory: backend
        files:
          - deployment-info.json
          - api-url.txt
    appRoot: backend
