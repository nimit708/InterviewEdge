version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd frontend
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: frontend/build
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
    appRoot: frontend
  - backend:
      phases:
        build:
          commands:
            - cd backend
            - pip install -r requirements.txt -t .
            - zip -r function.zip .
      artifacts:
        baseDirectory: backend
        files:
          - function.zip
    appRoot: backend
