AWSTemplateFormatVersion: '2010-09-09'
Description: 'InterviewEdge Backend - Lambda Function with API Gateway'

Parameters:
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket name where function.zip is uploaded
    Default: interviewedge-lambda-code

Resources:
  # Lambda Function (using existing IAM role)
  InterviewEdgeFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: InterviewEdge-API
      Runtime: python3.11
      Handler: main.handler
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/InterviewEdge-Lambda-Role'
      Timeout: 30
      MemorySize: 512
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*'
                  },
                  'body': '{"message": "Placeholder - Upload your code"}'
              }

  # API Gateway HTTP API
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: InterviewEdge-API
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - '*'
        MaxAge: 600

  # API Gateway Integration
  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${InterviewEdgeFunction}'
      PayloadFormatVersion: '2.0'

  # API Gateway Route
  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub 'integrations/${ApiIntegration}'

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  # Lambda Permission for API Gateway
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InterviewEdgeFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

Outputs:
  ApiUrl:
    Description: API Gateway Endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: InterviewEdge-API-URL
  
  FunctionName:
    Description: Lambda Function Name
    Value: !Ref InterviewEdgeFunction
  
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt InterviewEdgeFunction.Arn
